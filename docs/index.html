<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risk Regime Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e1e4ed;
    --muted: #8b8fa3;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --blue: #3b82f6;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 16px;
    max-width: 1200px;
    margin: 0 auto;
  }
  h1 { font-size: 1.4rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.85rem; margin-bottom: 20px; }
  .loading { text-align: center; padding: 60px; color: var(--muted); }

  /* Regime header cards */
  .regime-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  .regime-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }
  .regime-card .label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .regime-card .value { font-size: 1.8rem; font-weight: 700; margin: 6px 0 2px; }
  .regime-card .detail { font-size: 0.75rem; color: var(--muted); }

  /* Signal pills */
  .signals-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
  }
  .signal-pill {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.8rem;
  }
  .signal-pill .dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .dot-on { background: var(--green); }
  .dot-off { background: var(--red); }

  /* Charts */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }
  @media (min-width: 768px) {
    .chart-grid { grid-template-columns: 1fr 1fr; }
    .chart-grid .full-width { grid-column: 1 / -1; }
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
  }
  .chart-card h3 { font-size: 0.85rem; margin-bottom: 12px; color: var(--muted); }
  .chart-card canvas { width: 100% !important; }

  /* History table */
  .table-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    overflow-x: auto;
    margin-bottom: 20px;
  }
  .table-card h3 { font-size: 0.85rem; margin-bottom: 12px; color: var(--muted); }
  table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
  th { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); color: var(--muted); font-weight: 500; white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
  }
  .tag-expansion { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-contraction { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag-on { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-off { background: rgba(239,68,68,0.15); color: var(--red); }
  .tag-mixed { background: rgba(234,179,8,0.15); color: var(--yellow); }

  footer { text-align: center; color: var(--muted); font-size: 0.72rem; padding: 12px 0; }
</style>
</head>
<body>

<h1>Risk Regime Dashboard</h1>
<p class="subtitle">Macro & risk regime signals from FRED data — updated monthly</p>

<div id="app"><div class="loading">Loading data...</div></div>

<script>
const CSV_URL = 'https://raw.githubusercontent.com/danahagist/risk-regime-data/main/data/macro_monthly_history.csv';

const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: true,
  aspectRatio: 2,
  plugins: {
    legend: { display: true, labels: { color: '#8b8fa3', boxWidth: 12, font: { size: 11 } } },
    tooltip: { mode: 'index', intersect: false }
  },
  scales: {
    x: { ticks: { color: '#8b8fa3', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#2a2d3a' } },
    y: { ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { color: '#2a2d3a' } }
  }
};

function regimeColor(val) {
  const v = (val || '').toLowerCase();
  if (v === 'expansion' || v === 'on') return '#22c55e';
  if (v === 'contraction' || v === 'off') return '#ef4444';
  return '#eab308';
}

function tagClass(val) {
  const v = (val || '').toLowerCase();
  if (v === 'expansion') return 'tag-expansion';
  if (v === 'contraction') return 'tag-contraction';
  if (v === 'on') return 'tag-on';
  if (v === 'off') return 'tag-off';
  return 'tag-mixed';
}

function formatDate(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
}

function fmt(v, decimals = 1) {
  const n = parseFloat(v);
  return isNaN(n) ? '—' : n.toFixed(decimals);
}

async function loadData() {
  const resp = await fetch(CSV_URL);
  const text = await resp.text();
  const { data } = Papa.parse(text, { header: true, skipEmptyLines: true });
  return data;
}

function buildDashboard(rows) {
  const latest = rows[rows.length - 1];
  const labels = rows.map(r => formatDate(r.date));

  // Macro signal descriptions
  const macroSignals = [
    { name: 'Ind. Production YoY', key: 'indpro_signal' },
    { name: 'CFNAI', key: 'cfnai_signal' },
    { name: 'Yield Curve', key: 'yield_curve_signal' },
  ];
  const riskSignals = [
    { name: 'S&P Trend', key: 'trend_on', invert: false },
    { name: 'Credit Stress', key: 'credit_off', invert: true },
    { name: 'VIX Stress', key: 'vix_off', invert: true },
  ];

  const app = document.getElementById('app');
  app.innerHTML = `
    <!-- Regime cards -->
    <div class="regime-row">
      <div class="regime-card">
        <div class="label">Macro Regime</div>
        <div class="value" style="color:${regimeColor(latest.macro_regime)}">${latest.macro_regime}</div>
        <div class="detail">Score: ${latest.macro_score} / 3</div>
      </div>
      <div class="regime-card">
        <div class="label">Risk Regime</div>
        <div class="value" style="color:${regimeColor(latest.risk_regime)}">${latest.risk_regime}</div>
        <div class="detail">Off votes: ${latest.off_votes} / 2</div>
      </div>
    </div>

    <!-- Signal pills -->
    <div class="signals-row">
      ${macroSignals.map(s => `
        <div class="signal-pill">
          <span>${s.name}</span>
          <span class="dot ${parseInt(latest[s.key]) === 1 ? 'dot-on' : 'dot-off'}"></span>
        </div>
      `).join('')}
      ${riskSignals.map(s => {
        const on = s.invert ? parseInt(latest[s.key]) === 0 : parseInt(latest[s.key]) === 1;
        return `
          <div class="signal-pill">
            <span>${s.name}</span>
            <span class="dot ${on ? 'dot-on' : 'dot-off'}"></span>
          </div>`;
      }).join('')}
    </div>

    <!-- Charts -->
    <div class="chart-grid">
      <div class="chart-card full-width">
        <h3>S&P 500 vs 10-Month SMA</h3>
        <canvas id="chartSP500"></canvas>
      </div>
      <div class="chart-card">
        <h3>VIX (threshold: 25)</h3>
        <canvas id="chartVIX"></canvas>
      </div>
      <div class="chart-card">
        <h3>HY Credit OAS vs 12-Month SMA</h3>
        <canvas id="chartHYOAS"></canvas>
      </div>
      <div class="chart-card">
        <h3>Yield Curve Spread (10Y − 3M, bps)</h3>
        <canvas id="chartYield"></canvas>
      </div>
      <div class="chart-card">
        <h3>Unemployment Rate (%)</h3>
        <canvas id="chartUnrate"></canvas>
      </div>
    </div>

    <!-- History table -->
    <div class="table-card">
      <h3>Recent History (last 12 months)</h3>
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Macro</th><th>Score</th><th>Risk</th><th>S&P 500</th><th>VIX</th><th>HY OAS</th><th>Yield Spread</th>
          </tr>
        </thead>
        <tbody>
          ${rows.slice(-12).reverse().map(r => `
            <tr>
              <td>${formatDate(r.date)}</td>
              <td><span class="tag ${tagClass(r.macro_regime)}">${r.macro_regime}</span></td>
              <td>${r.macro_score}/3</td>
              <td><span class="tag ${tagClass(r.risk_regime)}">${r.risk_regime}</span></td>
              <td>${fmt(r.sp500, 0)}</td>
              <td>${fmt(r.vix)}</td>
              <td>${fmt(r.hy_oas)}</td>
              <td>${fmt(r.yield_curve_spread, 0)} bps</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>

    <footer>Data sourced from FRED via GitHub Actions &middot; Last data point: ${formatDate(latest.date)}</footer>
  `;

  // --- Charts ---
  const col = (key) => rows.map(r => parseFloat(r[key]) || null);

  // S&P 500
  new Chart(document.getElementById('chartSP500'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'S&P 500', data: col('sp500'), borderColor: '#3b82f6', borderWidth: 1.5, pointRadius: 0, fill: false },
        { label: '10M SMA', data: col('sp500_sma_10m'), borderColor: '#8b8fa3', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, fill: false },
      ]
    },
    options: CHART_DEFAULTS
  });

  // VIX
  new Chart(document.getElementById('chartVIX'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'VIX', data: col('vix'), borderColor: '#eab308', borderWidth: 1.5, pointRadius: 0, fill: false },
        { label: 'Threshold (25)', data: rows.map(() => 25), borderColor: '#ef4444', borderWidth: 1, borderDash: [4,3], pointRadius: 0, fill: false },
      ]
    },
    options: CHART_DEFAULTS
  });

  // HY OAS
  new Chart(document.getElementById('chartHYOAS'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'HY OAS', data: col('hy_oas'), borderColor: '#f97316', borderWidth: 1.5, pointRadius: 0, fill: false },
        { label: '12M SMA', data: col('hy_oas_sma_12m'), borderColor: '#8b8fa3', borderWidth: 1.5, borderDash: [4,3], pointRadius: 0, fill: false },
      ]
    },
    options: CHART_DEFAULTS
  });

  // Yield curve
  new Chart(document.getElementById('chartYield'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Spread (bps)', data: col('yield_curve_spread'), borderColor: '#8b5cf6', borderWidth: 1.5, pointRadius: 0, fill: false },
        { label: 'Zero line', data: rows.map(() => 0), borderColor: '#ef4444', borderWidth: 1, borderDash: [4,3], pointRadius: 0, fill: false },
      ]
    },
    options: CHART_DEFAULTS
  });

  // Unemployment
  new Chart(document.getElementById('chartUnrate'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Unemployment %', data: col('unrate'), borderColor: '#14b8a6', borderWidth: 1.5, pointRadius: 0, fill: false },
      ]
    },
    options: CHART_DEFAULTS
  });
}

loadData().then(buildDashboard).catch(err => {
  document.getElementById('app').innerHTML = `<div class="loading">Error loading data: ${err.message}</div>`;
});
</script>
</body>
</html>
